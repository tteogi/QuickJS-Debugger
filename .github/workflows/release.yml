name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Package
      run: |
        cd build/debugger
        tar czf qjs_debug-linux-x86_64.tar.gz qjs_debug ../../test.js

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qjs_debug-linux-x86_64
        path: build/debugger/qjs_debug-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Package
      run: |
        cd build/debugger/Release
        Compress-Archive -Path qjs_debug.exe, ../../../test.js -DestinationPath qjs_debug-windows-x86_64.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qjs_debug-windows-x86_64
        path: build/debugger/Release/qjs_debug-windows-x86_64.zip

  build-macos:
    runs-on: macos-14
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build -j$(sysctl -n hw.ncpu)

    - name: Package
      run: |
        cd build/debugger
        tar czf qjs_debug-macos-arm64.tar.gz qjs_debug ../../test.js

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qjs_debug-macos-arm64
        path: build/debugger/qjs_debug-macos-arm64.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          artifacts/qjs_debug-linux-x86_64/qjs_debug-linux-x86_64.tar.gz
          artifacts/qjs_debug-windows-x86_64/qjs_debug-windows-x86_64.zip
          artifacts/qjs_debug-macos-arm64/qjs_debug-macos-arm64.tar.gz
